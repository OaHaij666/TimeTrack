                    return sum + t.sessions.reduce((s, session) => s + session.duration, 0);
                }
                return sum;
            }, 0);
            document.getElementById('statsMonthFocus').textContent = `${(monthSeconds / 3600).toFixed(1)}小时`;

            // 上月对比
            const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            const lastMonthEnd = new Date(today.getFullYear(), today.getMonth(), 0);
            const lastMonthSeconds = allTasks.reduce((sum, t) => {
                const taskDate = new Date(t.date);
                if (taskDate >= lastMonth && taskDate <= lastMonthEnd) {
                    return sum + t.sessions.reduce((s, session) => s + session.duration, 0);
                }
                return sum;
            }, 0);
            const monthCompare = formatComparison(monthSeconds, lastMonthSeconds, '上月');
            document.getElementById('statsMonthCompare').innerHTML = monthCompare.html;
            document.getElementById('statsMonthCompare').className = `stat-comparison ${monthCompare.class}`;

            // ========== 完成任务数 ==========
            const completedCount = allTasks.filter(t => t.status === 'completed').length;
            document.getElementById('statsCompletedTasks').textContent = `${completedCount}个`;

            // 上月完成任务对比
            const lastMonthCompleted = allTasks.filter(t => {
                if (t.status !== 'completed') return false;
                const taskDate = new Date(t.date);
                return taskDate >= lastMonth && taskDate <= lastMonthEnd;
            }).length;
            const taskCompare = formatComparison(completedCount, lastMonthCompleted, '上月', '个');
            document.getElementById('statsTaskCompare').innerHTML = taskCompare.html;
            document.getElementById('statsTaskCompare').className = `stat-comparison ${taskCompare.class}`;

            // 渲染本周图表
            renderWeekChart();

            // 渲染任务排行
            renderTaskRank();
        }

        // 格式化对比数据
        function formatComparison(current, previous, label, unit = '') {
            if (previous === 0) {
                if (current === 0) {
                    return { html: `较${label}持平`, class: 'neutral' };
                }
                return { html: `↑ 较${label}新增`, class: 'positive' };
            }
            
            const diff = current - previous;
            const percent = Math.round((diff / previous) * 100);
            
            if (diff > 0) {
                return { html: `↑ 较${label} +${percent}%`, class: 'positive' };
            } else if (diff < 0) {
                return { html: `↓ 较${label} ${percent}%`, class: 'negative' };
            }
            return { html: `较${label}持平`, class: 'neutral' };
        }

        // 渲染本周图表
        function renderWeekChart() {
            const weekChart = document.getElementById('weekChart');
            weekChart.innerHTML = '';

            const today = new Date();
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

            for (let i = 0; i < 7; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() - today.getDay() + i);
                const dateStr = formatDate(date);
                const dayTasks = DataManager.getTasksByDate(dateStr);
                const daySeconds = dayTasks.reduce((sum, t) => 
                    sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
                const dayMinutes = Math.floor(daySeconds / 60);
                const maxMinutes = 120;
                const height = Math.min((dayMinutes / maxMinutes) * 100, 100);
                const isToday = i === today.getDay();

                const barWrapper = document.createElement('div');
                barWrapper.className = 'week-bar-wrapper';
                barWrapper.innerHTML = `
                    <div class="week-bar ${isToday ? 'active' : ''}" style="height: ${Math.max(height, 8)}%;"></div>
                    <div class="week-label">${weekdays[i]}</div>
                `;
                weekChart.appendChild(barWrapper);
            }
        }

        // 渲染任务排行
        function renderTaskRank() {
            const rankList = document.getElementById('taskRankList');
            rankList.innerHTML = '';

            const allTasks = DataManager.getTasks();
            const taskStats = {};

            allTasks.forEach(task => {
                const totalSeconds = task.sessions.reduce((sum, s) => sum + s.duration, 0);
                if (totalSeconds > 0) {
                    if (!taskStats[task.name]) {
                        taskStats[task.name] = { name: task.name, totalSeconds: 0, color: task.color };
                    }
                    taskStats[task.name].totalSeconds += totalSeconds;
                }
            });

            const sortedTasks = Object.values(taskStats)
                .sort((a, b) => b.totalSeconds - a.totalSeconds)
                .slice(0, 5);

            const maxSeconds = sortedTasks.length > 0 ? sortedTasks[0].totalSeconds : 1;

            sortedTasks.forEach((task, index) => {
                const hours = (task.totalSeconds / 3600).toFixed(1);
                const progress = (task.totalSeconds / maxSeconds) * 100;

                const rankItem = document.createElement('div');
                rankItem.className = 'rank-item';
                rankItem.innerHTML = `
                    <div class="rank-number ${index < 3 ? 'top' : ''}">${index + 1}</div>
                    <div class="rank-info">
                        <div class="rank-name">${task.name}</div>
                        <div class="rank-bar">
                            <div class="rank-progress" style="width: ${progress}%; background: ${task.color};"></div>
                        </div>
                    </div>
                    <div class="rank-time">${hours}h</div>
                `;
                rankList.appendChild(rankItem);
            });

            if (sortedTasks.length === 0) {
                rankList.innerHTML = '<div class="empty-state"><div class="empty-text">暂无专注数据</div></div>';
            }
        }

        // ==================== 日历相关 ====================
        function createDayCell(day, isOtherMonth) {
            const cell = document.createElement('div');
            cell.className = `day-cell ${isOtherMonth ? 'other-month' : ''}`;
            cell.innerHTML = `<div class="day-number">${day}</div>`;
            return cell;
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            selectedDate = new Date();
            renderCalendar();
            renderSelectedDateTasks();
        }

        function selectDate(year, month, day) {
            selectedDate = new Date(year, month, day);
            renderCalendar();
            renderSelectedDateTasks();
        }

        function renderSelectedDateTasks() {
            const dateStr = formatDate(selectedDate);
            const tasks = DataManager.getTasksByDate(dateStr);

            document.getElementById('selectedDateTitle').textContent = 
                `${selectedDate.getMonth() + 1}月${selectedDate.getDate()}日 任务`;

            renderTaskListToElement(tasks, 'selectedDateTaskList');
        }

        function addTaskForSelectedDate() {
            openTaskModal(null, formatDate(selectedDate));
        }

        // ==================== 任务列表渲染 ====================
        function renderTaskListToElement(tasks, elementId) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🌟</div>
                        <div class="empty-text">暂无任务，点击 + 添加</div>
                    </div>
                `;
                return;
            }

            // 排序：运行中 > 待完成 > 已完成
            const sortedTasks = tasks.sort((a, b) => {
                const statusOrder = { 'running': 0, 'pending': 1, 'completed': 2, 'paused': 3 };
                return statusOrder[a.status] - statusOrder[b.status];
            });

            sortedTasks.forEach(task => {
                const totalSeconds = task.sessions.reduce((sum, s) => sum + s.duration, 0);
                const totalMinutes = Math.floor(totalSeconds / 60);
                const isRunning = task.status === 'running';
                const isPaused = task.status === 'paused';
                const isCompleted = task.status === 'completed';

                let actionBtn = '';
                if (isCompleted) {
                    actionBtn = `<button class="task-action completed">✓</button>`;
                } else if (isRunning) {
                    actionBtn = `<button class="task-action pause" onclick="event.stopPropagation(); pauseTask('${task.id}')">⏸️</button>`;
                } else if (isPaused) {
                    actionBtn = `<button class="task-action resume" onclick="event.stopPropagation(); resumeTask('${task.id}')">▶️</button>`;
                } else {
                    actionBtn = `<button class="task-action start" onclick="event.stopPropagation(); startTask('${task.id}')">▶️</button>`;
                }

                const taskCard = document.createElement('div');
                taskCard.className = `task-card ${isRunning ? 'running' : ''} ${isPaused ? 'paused' : ''} ${isCompleted ? 'completed' : ''}`;
                taskCard.onclick = () => openTaskModal(task);

                // 计算当前运行时间
                let currentDuration = totalSeconds;
                if (isRunning && task.timerStartTimestamp) {
                    const elapsed = Math.floor((Date.now() - task.timerStartTimestamp) / 1000);
                    currentDuration += elapsed;
                }

                const hours = Math.floor(currentDuration / 3600);
                const minutes = Math.floor((currentDuration % 3600) / 60);
                const seconds = currentDuration % 60;
                const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                taskCard.innerHTML = `
                    <div class="task-card-header">
                        <div class="task-color" style="background: ${task.color};"></div>
                        <div class="task-info">
                            <div class="task-name">${task.name}</div>
                            <div class="task-meta">预计 ${task.duration} 分钟 · 已专注 ${totalMinutes} 分钟</div>
                        </div>
                        ${actionBtn}
                    </div>
                    <div class="task-timer-area">
                        <div class="timer-display-row">
                            <div class="timer-display" id="timer-${task.id}">${timeStr}</div>
                            <div class="timer-status">${isRunning ? '计时中' : (isPaused ? '已暂停' : '')}</div>
                        </div>
                        <div class="timer-controls-row">
                            ${isRunning ? 
                                `<button class="timer-btn pause" onclick="event.stopPropagation(); pauseTask('${task.id}')">⏸️ 暂停</button>
                                 <button class="timer-btn stop" onclick="event.stopPropagation(); stopTask('${task.id}')">⏹️ 结束</button>` :
                                `<button class="timer-btn resume" onclick="event.stopPropagation(); resumeTask('${task.id}')">▶️ 继续</button>
                                 <button class="timer-btn stop" onclick="event.stopPropagation(); stopTask('${task.id}')">⏹️ 结束</button>`
                            }
                        </div>
                    </div>
                `;

                container.appendChild(taskCard);
            });
        }

        // ==================== 计时功能（基于系统时间戳）====================
        function startTask(taskId) {
            const task = DataManager.getTask(taskId);
            if (!task) return;

            // 暂停其他运行中的任务
            const runningTask = DataManager.getTasks().find(t => t.status === 'running' && t.id !== taskId);
            if (runningTask) {
                pauseTask(runningTask.id);
            }

            // 更新任务状态 - 使用系统时间戳
            task.status = 'running';
            task.timerStartTimestamp = Date.now();
            task.totalPausedDuration = task.totalPausedDuration || 0;
            DataManager.updateTask(task);

            currentTask = task;

            // 刷新UI
            refreshCurrentPage();

            // 启动定时器更新显示
            startTimerUpdate(taskId);

            showToast('开始专注！');
        }

        function pauseTask(taskId) {
            const task = DataManager.getTask(taskId);
            if (!task || task.status !== 'running') return;

            // 计算本次运行的时长
            const now = Date.now();
            const elapsed = Math.floor((now - task.timerStartTimestamp) / 1000);

            // 保存会话
            task.sessions.push({
                startTime: task.timerStartTimestamp,
                endTime: now,
                duration: elapsed
            });

            task.status = 'paused';
            task.timerStartTimestamp = null;
            task.totalPausedDuration = (task.totalPausedDuration || 0) + elapsed;
            DataManager.updateTask(task);

            if (currentTask && currentTask.id === taskId) {
                currentTask = null;
                stopTimerUpdate();
            }

            refreshCurrentPage();
            showToast('已暂停');
        }

        function resumeTask(taskId) {
            const task = DataManager.getTask(taskId);
            if (!task) return;

            // 暂停其他运行中的任务
            const runningTask = DataManager.getTasks().find(t => t.status === 'running' && t.id !== taskId);
            if (runningTask) {
                pauseTask(runningTask.id);
            }

            task.status = 'running';
            task.timerStartTimestamp = Date.now();
            DataManager.updateTask(task);

            currentTask = task;

            refreshCurrentPage();
            startTimerUpdate(taskId);

            showToast('继续专注！');
        }

        function stopTask(taskId) {
            const task = DataManager.getTask(taskId);
            if (!task) return;

            // 如果正在运行，先暂停保存当前会话
            if (task.status === 'running' && task.timerStartTimestamp) {
                const now = Date.now();
                const elapsed = Math.floor((now - task.timerStartTimestamp) / 1000);
                task.sessions.push({
                    startTime: task.timerStartTimestamp,
                    endTime: now,
                    duration: elapsed
                });
            }

            task.status = 'completed';
            task.timerStartTimestamp = null;
            DataManager.updateTask(task);

            if (currentTask && currentTask.id === taskId) {
                currentTask = null;
                stopTimerUpdate();
            }

            refreshCurrentPage();
            showToast('任务完成！');
        }

        // 定时器更新显示
        function startTimerUpdate(taskId) {
            stopTimerUpdate();

            timerInterval = setInterval(() => {
                const task = DataManager.getTask(taskId);
                if (!task || task.status !== 'running' || !task.timerStartTimestamp) {
                    stopTimerUpdate();
                    return;
                }

                // 基于系统时间戳计算
                const now = Date.now();
                const elapsed = Math.floor((now - task.timerStartTimestamp) / 1000);
                const totalSeconds = task.sessions.reduce((sum, s) => sum + s.duration, 0) + elapsed;

                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                const timerElement = document.getElementById(`timer-${taskId}`);
                if (timerElement) {
                    timerElement.textContent = timeStr;
                }
            }, 1000);
        }

        function stopTimerUpdate() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // ==================== 页面加载时恢复计时状态 ====================
        function restoreRunningTimer() {
            const runningTask = DataManager.getTasks().find(t => t.status === 'running');
            if (runningTask && runningTask.timerStartTimestamp) {
                // 验证时间戳是否合理（防止异常值）
                const now = Date.now();
                const elapsed = now - runningTask.timerStartTimestamp;
                
                // 如果已经运行超过24小时，自动暂停（防止异常）
                if (elapsed > 24 * 60 * 60 * 1000) {
                    runningTask.status = 'paused';
                    runningTask.timerStartTimestamp = null;
                    DataManager.updateTask(runningTask);
                    showToast('检测到长时间运行，已自动暂停');
                } else {
                    currentTask = runningTask;
                    startTimerUpdate(runningTask.id);
                }
            }
        }

        // ==================== 任务模态框 ====================
        function openTaskModal(task = null, dateStr = null) {
            editingTaskId = task ? task.id : null;
            document.getElementById('modalTitle').textContent = task ? '编辑任务' : '新建任务';
            document.getElementById('deleteBtn').style.display = task ? 'block' : 'none';

            if (task) {
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskName').value = task.name;
                document.getElementById('taskDate').value = task.date;
                document.getElementById('taskDuration').value = task.duration;
                selectColorByValue(task.color);
                selectRepeatByValue(task.repeat || 'none');
                selectedWeekdays = task.weekdays || [];
                updateWeekdaySelector();
            } else {
                document.getElementById('taskForm').reset();
                document.getElementById('taskId').value = '';
                document.getElementById('taskDate').value = dateStr || formatDate(new Date());
                selectColorByValue(colors[0]);
                selectRepeatByValue('none');
                selectedWeekdays = [];
                updateWeekdaySelector();
            }

            document.getElementById('taskModal').classList.add('active');
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('active');
            editingTaskId = null;
        }

        function applyTemplate(name, duration, color) {
            document.getElementById('taskName').value = name;
            document.getElementById('taskDuration').value = duration;
            selectColorByValue(color);
        }

        function selectColor(element) {
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedColor = element.dataset.color;
        }

        function selectColorByValue(color) {
            selectedColor = color;
            document.querySelectorAll('.color-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.color === color);
            });
        }

        function selectRepeat(element) {
            document.querySelectorAll('.repeat-chip').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedRepeat = element.dataset.repeat;

            const weekdaySelector = document.getElementById('weekdaySelector');
            if (selectedRepeat === 'weekly') {
                weekdaySelector.classList.add('show');
            } else {
                weekdaySelector.classList.remove('show');
            }
        }

        function selectRepeatByValue(repeat) {
            selectedRepeat = repeat;
            document.querySelectorAll('.repeat-chip').forEach(el => {
                el.classList.toggle('selected', el.dataset.repeat === repeat);
            });

            const weekdaySelector = document.getElementById('weekdaySelector');
            if (repeat === 'weekly') {
                weekdaySelector.classList.add('show');
            } else {
                weekdaySelector.classList.remove('show');
            }
        }

        function toggleWeekday(element) {
            const day = parseInt(element.dataset.day);
            if (selectedWeekdays.includes(day)) {
                selectedWeekdays = selectedWeekdays.filter(d => d !== day);
                element.classList.remove('selected');
            } else {
                selectedWeekdays.push(day);
                element.classList.add('selected');
            }
        }

        function updateWeekdaySelector() {
            document.querySelectorAll('.weekday-chip').forEach(el => {
                const day = parseInt(el.dataset.day);
                el.classList.toggle('selected', selectedWeekdays.includes(day));
            });
        }

        // ==================== 保存任务 ====================
        function saveTask(event) {
            event.preventDefault();

            const name = document.getElementById('taskName').value.trim();
            const date = document.getElementById('taskDate').value;
            const duration = parseInt(document.getElementById('taskDuration').value);

            if (!name || !date) {
                showToast('请填写完整信息');
                return;
            }

            if (editingTaskId) {
                // 编辑现有任务
                const task = DataManager.getTask(editingTaskId);
                if (task) {
                    task.name = name;
                    task.date = date;
                    task.duration = duration;
                    task.color = selectedColor;
                    task.repeat = selectedRepeat;
                    task.weekdays = selectedWeekdays;
                    DataManager.updateTask(task);
                    showToast('任务已更新');
                }
            } else {
                // 创建新任务（支持重复）
                const dates = generateTaskDates(date, selectedRepeat, selectedWeekdays);
                const newTasks = dates.map((taskDate, index) => ({
                    id: generateId() + (index > 0 ? `-${index}` : ''),
                    name: name,
                    date: formatDate(taskDate),
                    duration: duration,
                    color: selectedColor,
                    status: 'pending',
                    sessions: [],
                    timerStartTimestamp: null,
                    totalPausedDuration: 0,
                    repeat: selectedRepeat,
                    weekdays: selectedWeekdays
                }));

                DataManager.addTasks(newTasks);
                showToast(`已创建 ${newTasks.length} 个任务`);
            }

            closeTaskModal();
            refreshCurrentPage();
        }

        // 生成任务日期
        function generateTaskDates(startDate, repeatType, weekdays) {
            const dates = [];
            const endDate = new Date(startDate);
            endDate.setDate(endDate.getDate() + 30); // 默认生成30天内的任务

            if (repeatType === 'none') {
                dates.push(new Date(startDate));
            } else if (repeatType === 'daily') {
                for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                    dates.push(new Date(d));
                }
            } else if (repeatType === 'workday') {
                for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                    const day = d.getDay();
                    if (day >= 1 && day <= 5) {
                        dates.push(new Date(d));
                    }
                }
            } else if (repeatType === 'weekly') {
                if (weekdays.length === 0) {
                    dates.push(new Date(startDate));
                } else {
                    for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                        if (weekdays.includes(d.getDay())) {
                            dates.push(new Date(d));
                        }
                    }
                }
            }
            return dates;
        }

        // ==================== 删除任务 ====================
        function confirmDelete() {
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        function deleteTask() {
            if (editingTaskId) {
                DataManager.deleteTask(editingTaskId);
                showToast('任务已删除');
                closeConfirmModal();
                closeTaskModal();
                refreshCurrentPage();
            }
        }

        // ==================== 工具函数 ====================
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function refreshCurrentPage() {
            if (currentPage === 'today') {
                renderTodayPage();
            } else if (currentPage === 'calendar') {
                renderSelectedDateTasks();
            } else if (currentPage === 'stats') {
                renderStatsPage();
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ==================== 主题切换 ====================
        let currentTheme = localStorage.getItem('theme') || 'light';

        function initTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeIcon();
        }

        function toggleTheme() {
            if (currentTheme === 'light') {
                currentTheme = 'dark';
            } else if (currentTheme === 'dark') {
                currentTheme = 'auto';
            } else {
                currentTheme = 'light';
            }
            
            if (currentTheme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', currentTheme);
            }
            
            localStorage.setItem('theme', currentTheme);
            updateThemeIcon();
            
            const themeNames = {
                'light': '☀️ 浅色模式',
                'dark': '🌙 深色模式',
                'auto': '🔄 跟随系统'
            };
            showToast(themeNames[currentTheme]);
        }

        function updateThemeIcon() {
            const btn = document.querySelector('#statsPage .header-btn');
            if (btn) {
                const icons = {
                    'light': '🌙',
                    'dark': '☀️',
                    'auto': '🔄'
                };
                btn.textContent = icons[currentTheme];
            }
        }

        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (currentTheme === 'auto') {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            }
        });

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化主题
            initTheme();

            // 初始化颜色选择器事件
            document.querySelectorAll('.color-option').forEach(el => {
                el.addEventListener('click', () => selectColor(el));
            });

            // 恢复运行中的计时器
            restoreRunningTimer();

            // 渲染初始页面
            renderTodayPage();
            renderCalendar();

            // 页面可见性变化时恢复计时
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    restoreRunningTimer();
                    refreshCurrentPage();
                }
            });
        });

        // 页面关闭前保存状态
        window.addEventListener('beforeunload', () => {
            // 确保所有状态已保存
            if (currentTask && currentTask.status === 'running') {
                // 状态已经保存在 localStorage 中，无需额外操作
            }
        });
    </script>
