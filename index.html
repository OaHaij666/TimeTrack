    <script>
        // ==================== 数据管理 ====================
        const DataManager = {
            // ========== 任务模板存储（新模型）==========
            getTaskTemplates() {
                const templates = localStorage.getItem('taskTemplates');
                return templates ? JSON.parse(templates) : [];
            },
            saveTaskTemplates(templates) {
                localStorage.setItem('taskTemplates', JSON.stringify(templates));
            },
            addTaskTemplate(template) {
                const templates = this.getTaskTemplates();
                templates.push(template);
                this.saveTaskTemplates(templates);
            },
            updateTaskTemplate(updatedTemplate) {
                const templates = this.getTaskTemplates();
                const index = templates.findIndex(t => t.id === updatedTemplate.id);
                if (index !== -1) {
                    templates[index] = updatedTemplate;
                    this.saveTaskTemplates(templates);
                }
            },
            deleteTaskTemplate(id) {
                const templates = this.getTaskTemplates().filter(t => t.id !== id);
                this.saveTaskTemplates(templates);
            },
            getTaskTemplate(id) {
                return this.getTaskTemplates().find(t => t.id === id);
            },

            // ========== 任务实例存储（用于记录某天的任务状态）==========
            getTaskInstances() {
                const instances = localStorage.getItem('taskInstances');
                return instances ? JSON.parse(instances) : {};
            },
            saveTaskInstances(instances) {
                localStorage.setItem('taskInstances', JSON.stringify(instances));
            },
            // 获取某天的任务实例，如果不存在则根据模板生成
            getOrCreateTaskInstancesForDate(dateStr) {
                const instances = this.getTaskInstances();
                if (!instances[dateStr]) {
                    instances[dateStr] = this.generateTaskInstancesForDate(dateStr);
                    this.saveTaskInstances(instances);
                }
                return instances[dateStr];
            },
            // 根据模板生成某天的任务实例
            generateTaskInstancesForDate(dateStr) {
                const date = new Date(dateStr);
                const dayOfWeek = date.getDay();
                const templates = this.getTaskTemplates();
                const instances = [];

                templates.forEach(template => {
                    // 检查该模板是否适用于这一天
                    if (this.isTemplateActiveOnDate(template, dateStr)) {
                        const instanceId = `${template.id}_${dateStr}`;
                        instances.push({
                            id: instanceId,
                            templateId: template.id,
                            name: template.name,
                            date: dateStr,
                            startTime: template.startTime,
                            endTime: template.endTime,
                            color: template.color,
                            taskType: template.taskType,
                            status: 'pending',
                            sessions: [],
                            timerStartTimestamp: null
                        });
                    }
                });

                return instances;
            },
            // 检查模板是否在指定日期生效
            isTemplateActiveOnDate(template, dateStr) {
                // 不早于开始日期（字符串比较，格式 YYYY-MM-DD）
                if (dateStr < template.startDate) return false;

                const date = new Date(dateStr);
                const dayOfWeek = date.getDay();
                const repeat = template.repeat || 'none';

                switch (repeat) {
                    case 'none':
                        // 不重复：只在开始日期当天
                        return dateStr === template.startDate;
                    case 'daily':
                        // 每天：从开始日期起每天都生效
                        return true;
                    case 'workday':
                        // 工作日：周一到周五
                        return dayOfWeek >= 1 && dayOfWeek <= 5;
                    case 'weekly':
                        // 每周：指定星期几
                        const weekdays = template.weekdays || [];
                        if (weekdays.length === 0) {
                            return dateStr === template.startDate;
                        }
                        return weekdays.includes(dayOfWeek);
                    default:
                        return false;
                }
            },
            // 更新任务实例
            updateTaskInstance(dateStr, updatedInstance) {
                const instances = this.getTaskInstances();
                if (instances[dateStr]) {
                    const index = instances[dateStr].findIndex(i => i.id === updatedInstance.id);
                    if (index !== -1) {
                        instances[dateStr][index] = updatedInstance;
                        this.saveTaskInstances(instances);
                    }
                }
            },
            // 获取某天的所有任务实例
            getTasksByDate(dateStr) {
                return this.getOrCreateTaskInstancesForDate(dateStr);
            },
            // 获取任务实例
            getTaskInstance(dateStr, instanceId) {
                const instances = this.getOrCreateTaskInstancesForDate(dateStr);
                return instances.find(i => i.id === instanceId);
            },
            // 获取某月的所有任务（用于日历显示）
            getTasksByMonth(year, month) {
                const templates = this.getTaskTemplates();
                const result = [];
                
                // 获取该月所有日期
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = formatDate(new Date(year, month, day));
                    const dayTasks = this.getTasksByDate(dateStr);
                    result.push(...dayTasks);
                }
                
                return result;
            },
            // 检查某天是否有任务（用于日历标记）
            hasTasksOnDate(dateStr) {
                const tasks = this.getTasksByDate(dateStr);
                return tasks.length > 0;
            },
            // ========== 任务数据统计（独立存储）==========
            getTaskStats() {
                const stats = localStorage.getItem('taskStats');
                return stats ? JSON.parse(stats) : {};
            },
            saveTaskStats(stats) {
                localStorage.setItem('taskStats', JSON.stringify(stats));
            },
            // 获取或创建任务统计记录
            getOrCreateTaskStat(taskName, taskType = 'normal') {
                const stats = this.getTaskStats();
                if (!stats[taskName]) {
                    stats[taskName] = {
                        name: taskName,
                        totalDuration: 0,  // 总专注时长（秒）
                        completedCount: 0, // 完成次数
                        taskType: taskType, // 'normal' 或 'quick'
                        lastUpdated: Date.now()
                    };
                    this.saveTaskStats(stats);
                }
                return stats[taskName];
            },
            // 更新任务专注时长
            addTaskDuration(taskName, durationSeconds) {
                const stats = this.getTaskStats();
                const stat = this.getOrCreateTaskStat(taskName);
                stat.totalDuration += durationSeconds;
                stat.lastUpdated = Date.now();
                stats[taskName] = stat;
                this.saveTaskStats(stats);
                return stat;
            },
            // 增加任务完成次数
            incrementTaskCompletion(taskName, taskType = 'normal') {
                const stats = this.getTaskStats();
                const stat = this.getOrCreateTaskStat(taskName, taskType);
                stat.completedCount += 1;
                stat.lastUpdated = Date.now();
                stats[taskName] = stat;
                this.saveTaskStats(stats);
                return stat;
            },
            // 删除任务统计数据
            deleteTaskStat(taskName) {
                const stats = this.getTaskStats();
                delete stats[taskName];
                this.saveTaskStats(stats);
            },
            // 获取所有任务统计（按时长排序，时长相同按次数排序）
            getAllTaskStatsSorted() {
                const stats = this.getTaskStats();
                return Object.values(stats).sort((a, b) => {
                    // 先按时长排序（降序）
                    if (b.totalDuration !== a.totalDuration) {
                        return b.totalDuration - a.totalDuration;
                    }
                    // 时长相同按次数排序（降序）
                    return b.completedCount - a.completedCount;
                });
            },
            // 获取筛选后的任务统计（基于实际任务实例计算）
            getFilteredTaskStats(filter = 'all') {
                if (filter === 'all') {
                    return this.getAllTaskStatsSorted();
                }

                const now = new Date();
                let startDate;

                switch (filter) {
                    case 'week':
                        startDate = new Date(now);
                        startDate.setDate(now.getDate() - now.getDay());
                        startDate.setHours(0, 0, 0, 0);
                        break;
                    case 'month':
                        startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                        break;
                    case 'year':
                        startDate = new Date(now.getFullYear(), 0, 1);
                        break;
                    default:
                        return this.getAllTaskStatsSorted();
                }

                const statsMap = {};
                const instances = this.getTaskInstances();
                const startTimestamp = startDate.getTime();

                for (const dateStr in instances) {
                    const dateTimestamp = new Date(dateStr).getTime();
                    if (dateTimestamp < startTimestamp) continue;

                    instances[dateStr].forEach(task => {
                        const taskName = task.name;
                        if (!statsMap[taskName]) {
                            statsMap[taskName] = {
                                name: taskName,
                                totalDuration: 0,
                                completedCount: 0,
                                taskType: task.taskType || 'normal',
                                lastUpdated: dateTimestamp
                            };
                        }

                        const sessionDuration = task.sessions.reduce((sum, s) => sum + (s.duration || 0), 0);
                        statsMap[taskName].totalDuration += sessionDuration;
                        
                        if (task.status === 'completed') {
                            statsMap[taskName].completedCount += 1;
                        }
                        
                        if (dateTimestamp > statsMap[taskName].lastUpdated) {
                            statsMap[taskName].lastUpdated = dateTimestamp;
                        }
                    });
                }

                const filteredStats = Object.values(statsMap);
                return filteredStats.sort((a, b) => {
                    if (b.totalDuration !== a.totalDuration) {
                        return b.totalDuration - a.totalDuration;
                    }
                    return b.completedCount - a.completedCount;
                });
            },
            // 持久化设置
            getSettings() {
                const settings = localStorage.getItem('timetrack_settings');
                return settings ? JSON.parse(settings) : {};
            },
            saveSettings(settings) {
                localStorage.setItem('timetrack_settings', JSON.stringify(settings));
            },
            getStatsTimeFilter() {
                const settings = this.getSettings();
                return settings.statsTimeFilter || 'all';
            },
            setStatsTimeFilter(filter) {
                const settings = this.getSettings();
                settings.statsTimeFilter = filter;
                this.saveSettings(settings);
            },
            // 获取自定义日期范围的统计
            getDateRangeTaskStats(dateStart, dateEnd) {
                const instances = this.getTaskInstances();
                const startTimestamp = new Date(dateStart).getTime();
                const endTimestamp = dateEnd 
                    ? new Date(dateEnd).getTime() + 86400000 
                    : Date.now() + 86400000;

                const statsMap = {};

                for (const dateStr in instances) {
                    const dateTimestamp = new Date(dateStr).getTime();
                    if (dateTimestamp < startTimestamp || dateTimestamp >= endTimestamp) continue;

                    instances[dateStr].forEach(task => {
                        const taskName = task.name;
                        if (!statsMap[taskName]) {
                            statsMap[taskName] = {
                                name: taskName,
                                totalDuration: 0,
                                completedCount: 0,
                                taskType: task.taskType || 'normal',
                                lastUpdated: dateTimestamp
                            };
                        }

                        const sessionDuration = task.sessions.reduce((sum, s) => sum + (s.duration || 0), 0);
                        statsMap[taskName].totalDuration += sessionDuration;
                        
                        if (task.status === 'completed') {
                            statsMap[taskName].completedCount += 1;
                        }
                        
                        if (dateTimestamp > statsMap[taskName].lastUpdated) {
                            statsMap[taskName].lastUpdated = dateTimestamp;
                        }
                    });
                }

                const filteredStats = Object.values(statsMap);
                return filteredStats.sort((a, b) => {
                    if (b.totalDuration !== a.totalDuration) {
                        return b.totalDuration - a.totalDuration;
                    }
                    return b.completedCount - a.completedCount;
                });
            },
            getStatsDateRange() {
                const settings = this.getSettings();
                return settings.statsDateRange || { start: '', end: '' };
            },
            setStatsDateRange(start, end) {
                const settings = this.getSettings();
                settings.statsDateRange = { start, end };
                this.saveSettings(settings);
            }
        };

        // ==================== 状态管理 ====================
        let currentDate = new Date();
        let selectedDate = new Date();
        let currentTask = null;
        let timerInterval = null;
        let editingTaskId = null;
        let currentPage = 'today';

        const colors = ['#6366f1', '#ec4899', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#f97316'];
        let selectedColor = colors[0];
        let selectedRepeat = 'none';
        let selectedWeekdays = [];
        let selectedTaskType = 'normal';

        // ==================== 页面切换 ====================
        function switchPage(page) {
            currentPage = page;
            
            document.querySelectorAll('.nav-item').forEach((item, index) => {
                item.classList.toggle('active', 
                    (page === 'today' && index === 0) ||
                    (page === 'calendar' && index === 1) ||
                    (page === 'stats' && index === 2)
                );
            });

            document.getElementById('todayPage').classList.toggle('active', page === 'today');
            document.getElementById('calendarPage').classList.toggle('active', page === 'calendar');
            document.getElementById('statsPage').classList.toggle('active', page === 'stats');

            if (page === 'today') {
                renderTodayPage();
            } else if (page === 'calendar') {
                renderCalendar();
                renderSelectedDateTasks();
            } else if (page === 'stats') {
                renderStatsPage();
            }
        }

        // ==================== 今日任务页面 ====================
        function renderTodayPage() {
            const today = new Date();
            const dateStr = formatDate(today);
            const tasks = DataManager.getTasksByDate(dateStr);

            document.getElementById('todayDay').textContent = today.getDate();
            document.getElementById('todayMonth').textContent = `${today.getMonth() + 1}月`;
            document.getElementById('todayWeekday').textContent = getWeekdayText(today);

            const totalSeconds = tasks.reduce((sum, t) => 
                sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
            const totalMinutes = Math.floor(totalSeconds / 60);
            document.getElementById('todayFocusTime').textContent = 
                totalMinutes < 60 ? `${totalMinutes}分钟` : `${(totalMinutes / 60).toFixed(1)}小时`;

            document.getElementById('todayTaskCount').textContent = `${tasks.length} 个任务`;

            renderTaskListToElement(tasks, 'todayTaskList');
        }

        function getWeekdayText(date) {
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            return weekdays[date.getDay()];
        }

        // ==================== 日历页面 ====================
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const daysGrid = document.getElementById('daysGrid');
            daysGrid.innerHTML = '';

            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                const cell = createDayCell(day, true);
                daysGrid.appendChild(cell);
            }

            const today = new Date();
            const isSelectedDateValid = selectedDate instanceof Date && !isNaN(selectedDate.getTime());

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = formatDate(new Date(year, month, day));
                // 使用新的 hasTasksOnDate 方法检查该天是否有任务
                const hasTasks = DataManager.hasTasksOnDate(dateStr);
                const isToday = today.getFullYear() === year && 
                               today.getMonth() === month && 
                               today.getDate() === day;
                const isSelected = isSelectedDateValid && 
                                  selectedDate.getFullYear() === year && 
                                  selectedDate.getMonth() === month && 
                                  selectedDate.getDate() === day;

                const cell = createDayCell(day, false, isToday, isSelected, hasTasks);
                cell.onclick = () => selectDate(new Date(year, month, day));
                daysGrid.appendChild(cell);
            }

            const remainingCells = 42 - (firstDay + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                const cell = createDayCell(day, true);
                daysGrid.appendChild(cell);
            }
        }

        function createDayCell(day, isOtherMonth, isToday = false, isSelected = false, hasTasks = false) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (isOtherMonth) cell.classList.add('other-month');
            if (isToday) cell.classList.add('today');
            if (isSelected) cell.classList.add('selected');
            if (hasTasks) cell.classList.add('has-tasks');

            const number = document.createElement('span');
            number.className = 'day-number';
            number.textContent = day;
            cell.appendChild(number);

            return cell;
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function selectDate(date) {
            selectedDate = date;
            renderCalendar();
            renderSelectedDateTasks();
        }

        function goToToday() {
            currentDate = new Date();
            selectedDate = new Date();
            renderCalendar();
            renderSelectedDateTasks();
        }

        function renderSelectedDateTasks() {
            // 确保 selectedDate 是有效的 Date 对象
            if (!(selectedDate instanceof Date) || isNaN(selectedDate.getTime())) {
                selectedDate = new Date();
            }
            
            const dateStr = formatDate(selectedDate);
            const tasks = DataManager.getTasksByDate(dateStr);
            
            const month = selectedDate.getMonth() + 1;
            const day = selectedDate.getDate();
            document.getElementById('selectedDateTitle').textContent = 
                `${month}月${day}日 任务`;
            
            renderTaskListToElement(tasks, 'selectedDateTaskList', false);
        }

        function addTaskForSelectedDate() {
            openTaskModal(formatDate(selectedDate));
        }

        // ==================== 任务列表渲染（行内计时版）====================
        function renderTaskListToElement(tasks, elementId, showActions = true) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🌟</div>
                        <div class="empty-text">暂无任务</div>
                    </div>
                `;
                return;
            }

            // 按时间段排序：有时间的按开始时间排序，没时间的排在最后
            const sortedTasks = [...tasks].sort((a, b) => {
                if (a.startTime && b.startTime) {
                    return a.startTime.localeCompare(b.startTime);
                }
                if (a.startTime && !b.startTime) return -1;
                if (!a.startTime && b.startTime) return 1;
                return 0;
            });

            sortedTasks.forEach((task, index) => {
                const totalFocused = task.sessions.reduce((sum, s) => sum + s.duration, 0);
                const isRunning = task.status === 'running';
                const isPaused = task.status === 'paused';
                const isCompleted = task.status === 'completed';

                // 创建时间线项包装
                const timelineItem = document.createElement('div');
                timelineItem.className = `timeline-item ${isRunning ? 'running' : ''} ${isCompleted ? 'completed' : ''}`;

                // 时间线圆点
                const timelineDot = document.createElement('div');
                timelineDot.className = 'timeline-dot';
                timelineItem.appendChild(timelineDot);

                // 时间显示（在时间线上方）
                if (task.startTime) {
                    const timeLabel = document.createElement('div');
                    timeLabel.className = 'timeline-time';
                    timeLabel.textContent = task.startTime;
                    timelineItem.appendChild(timeLabel);
                }

                const card = document.createElement('div');
                card.className = `task-card ${isRunning ? 'running' : ''} ${isPaused ? 'paused' : ''} ${isCompleted ? 'completed' : ''}`;
                card.id = `task-card-${task.id}`;
                
                let actionBtn = '';
                const isQuickTask = task.taskType === 'quick';
                
                if (showActions) {
                    if (isCompleted) {
                        actionBtn = `<button class="task-action completed" disabled></button>`;
                    } else if (isQuickTask) {
                        // 快速完成任务 - 点击即完成
                        actionBtn = `<button class="task-action quick-complete" onclick="event.stopPropagation(); completeQuickTask('${task.id}')" title="点击完成"></button>`;
                    } else if (isRunning) {
                        actionBtn = `<button class="task-action pause" onclick="event.stopPropagation(); pauseTask('${task.id}')"></button>`;
                    } else if (isPaused) {
                        actionBtn = `<button class="task-action resume" onclick="event.stopPropagation(); resumeTask('${task.id}')"></button>`;
                    } else {
                        actionBtn = `<button class="task-action start" onclick="event.stopPropagation(); startTask('${task.id}')"></button>`;
                    }
                }

                // 计算当前显示时间
                let displayTime = '00:00:00';
                const totalFocusedSeconds = task.sessions.reduce((sum, s) => sum + s.duration, 0);
                if (isRunning && task.timerStartTimestamp) {
                    const elapsed = Date.now() - task.timerStartTimestamp;
                    displayTime = formatTime(Math.floor(elapsed / 1000) + totalFocusedSeconds);
                } else if (isPaused) {
                    displayTime = formatTime(totalFocusedSeconds);
                }

                // 时间段显示
                const timeRange = task.startTime ? 
                    `${task.endTime ? task.startTime + '-' + task.endTime : '从 ' + task.startTime + ' 开始'}` : 
                    '未安排时间';

                // 判断是否应该展开（只有运行中默认展开，暂停状态由用户控制）
                const shouldExpand = showActions && isRunning;

                // 计时区域仅在显示操作按钮时显示
                const timerAreaHtml = showActions ? `
                    <div class="task-timer-area ${shouldExpand ? 'expanded' : ''}" id="timer-area-${task.id}">
                        <div class="timer-display-row">
                            <div class="timer-display" id="timer-display-${task.id}">${displayTime}</div>
                            <div class="timer-status" id="timer-status-${task.id}">${isRunning ? '计时中' : '已暂停'}</div>
                        </div>
                        <div class="timer-controls-row">
                            <button class="timer-btn ${isRunning ? 'pause' : 'resume'}" onclick="event.stopPropagation(); toggleTaskTimer('${task.id}')" id="timer-btn-${task.id}">
                                ${isRunning ? '暂停' : '继续'}
                            </button>
                            <button class="timer-btn stop" onclick="event.stopPropagation(); stopTask('${task.id}')">结束</button>
                        </div>
                    </div>
                ` : '';

                card.innerHTML = `
                    <div class="task-card-header" onclick="toggleTaskExpand('${task.id}')">
                        <div class="task-color" style="background: ${task.color};"></div>
                        <div class="task-info">
                            <div class="task-name">${task.name}</div>
                            <div class="task-meta">
                                ${timeRange}
                                ${totalFocused > 0 ? `· ⏱️ ${Math.floor(totalFocused / 60)}分钟` : ''}
                            </div>
                        </div>
                        ${actionBtn}
                    </div>
                    ${timerAreaHtml}
                `;

                timelineItem.appendChild(card);
                container.appendChild(timelineItem);
                
                // 如果任务正在运行，启动定时器更新
                if (isRunning) {
                    startTimerUpdate(task.id);
                }
            });
        }

        // ==================== 行内计时功能 ====================
        function startTask(taskId) {
            const dateStr = formatDate(new Date());
            const task = DataManager.getTaskInstance(dateStr, taskId);
            if (!task) return;

            // 暂停其他运行中的任务
            const tasks = DataManager.getTasksByDate(dateStr);
            const runningTask = tasks.find(t => t.status === 'running' && t.id !== taskId);
            if (runningTask) {
                pauseTask(runningTask.id);
            }

            // 更新任务状态
            task.status = 'running';
            task.timerStartTimestamp = Date.now();
            DataManager.updateTaskInstance(dateStr, task);

            currentTask = task;
            
            // 展开当前任务的计时区域
            const timerArea = document.getElementById(`timer-area-${taskId}`);
            if (timerArea) {
                timerArea.classList.add('expanded');
            }
            
            // 只更新单个任务卡片UI，不刷新整个页面
            updateTaskCardUI(taskId);
            
            // 启动定时器更新显示
            startTimerUpdate(taskId);
            
            showToast('开始专注！');
        }

        function pauseTask(taskId) {
            const dateStr = formatDate(new Date());
            const task = DataManager.getTaskInstance(dateStr, taskId);
            if (!task || task.status !== 'running') return;

            // 计算本次运行的时长（毫秒）
            const now = Date.now();
            const sessionDuration = now - task.timerStartTimestamp;
            
            // 保存会话（转换为秒）
            if (sessionDuration > 1000) { // 至少1秒才记录
                task.sessions.push({
                    startTime: task.timerStartTimestamp,
                    endTime: now,
                    duration: Math.floor(sessionDuration / 1000)
                });
            }
            
            task.status = 'paused';
            task.timerStartTimestamp = null;
            DataManager.updateTaskInstance(dateStr, task);

            if (currentTask && currentTask.id === taskId) {
                stopTimerUpdate();
            }

            // 只更新单个任务卡片UI，不刷新整个页面
            updateTaskCardUI(taskId);
        }

        function resumeTask(taskId) {
            const dateStr = formatDate(new Date());
            const task = DataManager.getTaskInstance(dateStr, taskId);
            if (!task) return;

            // 暂停其他运行中的任务
            const tasks = DataManager.getTasksByDate(dateStr);
            const runningTask = tasks.find(t => t.status === 'running' && t.id !== taskId);
            if (runningTask) {
                pauseTask(runningTask.id);
            }

            task.status = 'running';
            task.timerStartTimestamp = Date.now();
            DataManager.updateTaskInstance(dateStr, task);

            currentTask = task;
            
            // 只更新单个任务卡片UI，不刷新整个页面
            updateTaskCardUI(taskId);
            startTimerUpdate(taskId);
        }

        // 更新单个任务卡片UI（不刷新整个页面）
        function updateTaskCardUI(taskId) {
            const dateStr = formatDate(new Date());
            const task = DataManager.getTaskInstance(dateStr, taskId);
            if (!task) return;

            const card = document.getElementById(`task-card-${taskId}`);
            if (!card) return;

            const isRunning = task.status === 'running';
            const isPaused = task.status === 'paused';
            const isCompleted = task.status === 'completed';
            const isQuickTask = task.taskType === 'quick';

            // 更新卡片样式
            card.className = `task-card ${isRunning ? 'running' : ''} ${isPaused ? 'paused' : ''} ${isCompleted ? 'completed' : ''}`;

            // 更新小按钮（actionBtn）
            const header = card.querySelector('.task-card-header');
            if (header) {
                let actionBtn = header.querySelector('.task-action');
                if (actionBtn) {
                    // 更新按钮类名和onclick
                    if (isCompleted) {
                        actionBtn.className = 'task-action completed';
                        actionBtn.onclick = null;
                        actionBtn.disabled = true;
                    } else if (isQuickTask) {
                        actionBtn.className = 'task-action quick-complete';
                        actionBtn.onclick = (e) => { e.stopPropagation(); completeQuickTask(taskId); };
                    } else if (isRunning) {
                        actionBtn.className = 'task-action pause';
                        actionBtn.onclick = (e) => { e.stopPropagation(); pauseTask(taskId); };
                    } else if (isPaused) {
                        actionBtn.className = 'task-action resume';
                        actionBtn.onclick = (e) => { e.stopPropagation(); resumeTask(taskId); };
                    } else {
                        actionBtn.className = 'task-action start';
                        actionBtn.onclick = (e) => { e.stopPropagation(); startTask(taskId); };
                    }
                }
            }

            // 更新计时区域
            const timerArea = document.getElementById(`timer-area-${taskId}`);
            if (timerArea) {
                const totalFocusedSeconds = task.sessions.reduce((sum, s) => sum + s.duration, 0);
                const displayTime = formatTime(totalFocusedSeconds);
                
                const timerDisplay = document.getElementById(`timer-display-${taskId}`);
                const timerStatus = document.getElementById(`timer-status-${taskId}`);
                const timerBtn = document.getElementById(`timer-btn-${taskId}`);

                if (timerDisplay) timerDisplay.textContent = displayTime;
                if (timerStatus) timerStatus.textContent = isRunning ? '计时中' : '已暂停';
                if (timerBtn) {
                    timerBtn.className = `timer-btn ${isRunning ? 'pause' : 'resume'}`;
                    timerBtn.textContent = isRunning ? '暂停' : '继续';
                }
            }
        }

        function toggleTaskTimer(taskId) {
            const dateStr = formatDate(new Date());
            const task = DataManager.getTaskInstance(dateStr, taskId);
            if (!task) return;

            if (task.status === 'running') {
                pauseTask(taskId);
            } else {
                resumeTask(taskId);
            }
        }

        function stopTask(taskId) {
            const dateStr = formatDate(new Date());
            const task = DataManager.getTaskInstance(dateStr, taskId);
            if (!task) return;

            stopTimerUpdate();

            // 如果正在运行，先保存当前会话
            let sessionDurationSeconds = 0;
            if (task.status === 'running' && task.timerStartTimestamp) {
                const now = Date.now();
                const sessionDuration = now - task.timerStartTimestamp;
                sessionDurationSeconds = Math.floor(sessionDuration / 1000);
                
                if (sessionDuration > 1000) {
                    task.sessions.push({
                        startTime: task.timerStartTimestamp,
                        endTime: now,
                        duration: sessionDurationSeconds
                    });
                }
            }

            // 计算总专注时长
            const totalDuration = task.sessions.reduce((sum, s) => sum + s.duration, 0);

            // 更新任务统计数据（专注时长和完成次数）
            DataManager.addTaskDuration(task.name, totalDuration);
            DataManager.incrementTaskCompletion(task.name, task.taskType || 'normal');

            // 结束计时并标记为已完成
            task.status = 'completed';
            task.timerStartTimestamp = null;
            
            // 使用DataManager更新任务实例
            DataManager.updateTaskInstance(dateStr, task);

            if (currentTask && currentTask.id === taskId) {
                currentTask = null;
            }

            const totalMinutes = Math.floor(totalDuration / 60);
            showToast(`✅ 任务完成！累计专注 ${totalMinutes} 分钟`);
            
            // 收起计时区域
            const timerArea = document.getElementById(`timer-area-${taskId}`);
            if (timerArea) {
                timerArea.classList.remove('expanded');
            }
            
            // 只更新单个任务卡片UI，不刷新整个页面
            updateTaskCardUI(taskId);
        }

        // 快速完成任务（点击即完成）
        function completeQuickTask(taskId) {
            const dateStr = formatDate(new Date());
            const task = DataManager.getTaskInstance(dateStr, taskId);
            if (!task || task.status === 'completed') return;

            // 增加完成次数（没有专注时长）
            DataManager.incrementTaskCompletion(task.name, 'quick');

            // 标记任务为已完成
            task.status = 'completed';
            DataManager.updateTaskInstance(dateStr, task);

            showToast(`⚡ 快速完成！${task.name}`);
            
            // 只更新单个任务卡片UI，不刷新整个页面
            updateTaskCardUI(taskId);
        }

        // 手动完成任务
        function completeTask(taskId) {
            // 从taskId中提取日期 (格式: templateId_YYYY-MM-DD)
            const dateStr = taskId.split('_').slice(1).join('_');
            const task = DataManager.getTaskInstance(dateStr, taskId);
            if (!task) return;

            // 如果正在计时，先停止并保存会话
            if (task.status === 'running' && task.timerStartTimestamp) {
                stopTimerUpdate();
                const now = Date.now();
                const sessionDuration = now - task.timerStartTimestamp;
                
                if (sessionDuration > 1000) {
                    task.sessions.push({
                        startTime: task.timerStartTimestamp,
                        endTime: now,
                        duration: Math.floor(sessionDuration / 1000)
                    });
                }
            }

            task.status = 'completed';
            task.timerStartTimestamp = null;
            DataManager.updateTaskInstance(dateStr, task);
            
            // 更新统计数据
            DataManager.incrementTaskCompletion(task.name, task.taskType);

            if (currentTask && currentTask.id === taskId) {
                currentTask = null;
            }

            const totalMinutes = Math.floor(task.sessions.reduce((sum, s) => sum + s.duration, 0) / 60);
            showToast(`✅ 任务完成！共专注 ${totalMinutes} 分钟`);
            
            // 只更新单个任务卡片UI，不刷新整个页面
            updateTaskCardUI(taskId);
        }

        // 定时器更新
        function startTimerUpdate(taskId) {
            stopTimerUpdate();
            
            // 从taskId中提取日期
            const dateStr = taskId.split('_').slice(1).join('_');
            
            timerInterval = setInterval(() => {
                const task = DataManager.getTaskInstance(dateStr, taskId);
                if (!task || task.status !== 'running' || !task.timerStartTimestamp) {
                    stopTimerUpdate();
                    return;
                }

                const totalFocusedSeconds = task.sessions.reduce((sum, s) => sum + s.duration, 0);
                const elapsed = Date.now() - task.timerStartTimestamp;
                const displayElement = document.getElementById(`timer-display-${taskId}`);
                if (displayElement) {
                    displayElement.textContent = formatTime(Math.floor(elapsed / 1000) + totalFocusedSeconds);
                }
            }, 100);
        }

        function stopTimerUpdate() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // ==================== 删除确认 ====================
        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // ==================== 统计页面 ====================
        function renderStatsPage() {
            const today = new Date();
            const todayStr = formatDate(today);

            // ========== 今日统计 ==========
            const todayTasks = DataManager.getTasksByDate(todayStr);
            const todaySeconds = todayTasks.reduce((sum, t) => 
                sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
            const todayMinutes = Math.floor(todaySeconds / 60);
            document.getElementById('statsTodayFocus').textContent = 
                todayMinutes < 60 ? `${todayMinutes}分钟` : `${(todayMinutes / 60).toFixed(1)}小时`;

            // 昨日对比
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = formatDate(yesterday);
            const yesterdayTasks = DataManager.getTasksByDate(yesterdayStr);
            const yesterdaySeconds = yesterdayTasks.reduce((sum, t) => 
                sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
            const todayCompare = formatComparison(todaySeconds, yesterdaySeconds, '昨日');
            document.getElementById('statsTodayCompare').innerHTML = todayCompare.html;
            document.getElementById('statsTodayCompare').className = `stat-comparison ${todayCompare.class}`;

            // ========== 本周统计 ==========
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay());
            weekStart.setHours(0, 0, 0, 0);
            let weekSeconds = 0;
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + i);
                const dateStr = formatDate(date);
                const dayTasks = DataManager.getTasksByDate(dateStr);
                weekSeconds += dayTasks.reduce((sum, t) => 
                    sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
            }
            document.getElementById('statsWeekFocus').textContent = `${(weekSeconds / 3600).toFixed(1)}小时`;

            // 上周对比
            let lastWeekSeconds = 0;
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() - 7 + i);
                const dateStr = formatDate(date);
                const dayTasks = DataManager.getTasksByDate(dateStr);
                lastWeekSeconds += dayTasks.reduce((sum, t) => 
                    sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
            }
            const weekCompare = formatComparison(weekSeconds, lastWeekSeconds, '上周');
            document.getElementById('statsWeekCompare').innerHTML = weekCompare.html;
            document.getElementById('statsWeekCompare').className = `stat-comparison ${weekCompare.class}`;

            // ========== 本月统计 ==========
            const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
            let monthSeconds = 0;
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = formatDate(new Date(today.getFullYear(), today.getMonth(), day));
                const dayTasks = DataManager.getTasksByDate(dateStr);
                monthSeconds += dayTasks.reduce((sum, t) => 
                    sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
            }
            document.getElementById('statsMonthFocus').textContent = `${(monthSeconds / 3600).toFixed(1)}小时`;

            // 上月对比
            const lastMonthDays = new Date(today.getFullYear(), today.getMonth(), 0).getDate();
            let lastMonthSeconds = 0;
            for (let day = 1; day <= lastMonthDays; day++) {
                const dateStr = formatDate(new Date(today.getFullYear(), today.getMonth() - 1, day));
                const dayTasks = DataManager.getTasksByDate(dateStr);
                lastMonthSeconds += dayTasks.reduce((sum, t) => 
                    sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
            }
            const monthCompare = formatComparison(monthSeconds, lastMonthSeconds, '上月');
            document.getElementById('statsMonthCompare').innerHTML = monthCompare.html;
            document.getElementById('statsMonthCompare').className = `stat-comparison ${monthCompare.class}`;

            // ========== 总专注时间（根据日期范围筛选）==========
            const dateRange = DataManager.getStatsDateRange();
            let totalSeconds = 0;
            
            if (dateRange.start) {
                // 使用筛选后的日期范围（结束日期为空表示至今）
                const startTimestamp = new Date(dateRange.start).getTime();
                const endTimestamp = dateRange.end 
                    ? new Date(dateRange.end).getTime() + 86400000 
                    : Date.now() + 86400000;
                const instances = DataManager.getTaskInstances();
                
                for (const dateStr in instances) {
                    const dateTimestamp = new Date(dateStr).getTime();
                    if (dateTimestamp < startTimestamp || dateTimestamp >= endTimestamp) continue;
                    
                    totalSeconds += instances[dateStr].reduce((sum, t) => 
                        sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
                }
            } else {
                // 全部时间
                const instances = DataManager.getTaskInstances();
                Object.values(instances).forEach(dayTasks => {
                    totalSeconds += dayTasks.reduce((sum, t) => 
                        sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
                });
            }
            
            const totalHours = Math.floor(totalSeconds / 3600);
            const totalMinutes = Math.floor((totalSeconds % 3600) / 60);
            const totalTimeStr = totalHours > 0 ? `${totalHours}小时${totalMinutes}分钟` : `${totalMinutes}分钟`;
            document.getElementById('statsCompletedTasks').textContent = totalTimeStr;

            // 渲染本周图表
            renderWeekChart();

            // 渲染任务排行
            renderTaskRank();
        }

        // 格式化对比数据
        function formatComparison(current, previous, label, unit = '') {
            if (previous === 0) {
                if (current === 0) {
                    return { html: `较${label}持平`, class: 'neutral' };
                }
                return { html: `↑ 较${label}新增`, class: 'positive' };
            }
            
            const diff = current - previous;
            const percent = Math.round((diff / previous) * 100);
            
            if (diff > 0) {
                return { html: `↑ 较${label} +${percent}%`, class: 'positive' };
            } else if (diff < 0) {
                return { html: `↓ 较${label} ${percent}%`, class: 'negative' };
            }
            return { html: `较${label}持平`, class: 'neutral' };
        }

        // 渲染本周图表
        function renderWeekChart() {
            const weekChart = document.getElementById('weekChart');
            weekChart.innerHTML = '';

            const today = new Date();
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

            for (let i = 0; i < 7; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() - today.getDay() + i);
                const dateStr = formatDate(date);
                const dayTasks = DataManager.getTasksByDate(dateStr);
                const daySeconds = dayTasks.reduce((sum, t) => 
                    sum + t.sessions.reduce((s, session) => s + session.duration, 0), 0);
                const dayMinutes = Math.floor(daySeconds / 60);
                const maxMinutes = 480;
                const heightPercent = Math.min((dayMinutes / maxMinutes) * 100, 100);
                const isToday = i === today.getDay();

                const timeDisplay = dayMinutes < 60 ? `${dayMinutes}分` : `${(dayMinutes / 60).toFixed(1)}时`;
                const timeDisplayHtml = `<div class="week-bar-time">${timeDisplay}</div>`;

                const barWrapper = document.createElement('div');
                barWrapper.className = 'week-bar-wrapper';
                const barHeight = Math.max(heightPercent, 4);
                barWrapper.innerHTML = `
                    ${timeDisplayHtml}
                    <div class="week-bar ${isToday ? 'active' : ''}" style="height: ${barHeight}%;"></div>
                    <div class="week-label">${weekdays[i]}</div>
                `;
                weekChart.appendChild(barWrapper);
            }
        }

        // 渲染任务数据（使用自定义日期范围）
        function renderTaskRank() {
            const rankList = document.getElementById('taskRankList');
            rankList.innerHTML = '';

            // 使用自定义日期范围
            const dateRange = DataManager.getStatsDateRange();
            let sortedStats;
            
            if (dateRange.start) {
                // 开始日期有值就筛选（结束日期为空表示至今）
                sortedStats = DataManager.getDateRangeTaskStats(dateRange.start, dateRange.end);
            } else {
                sortedStats = DataManager.getAllTaskStatsSorted();
            }

            if (sortedStats.length === 0) {
                rankList.innerHTML = '<div class="empty-state"><div class="empty-text">暂无专注数据</div></div>';
                return;
            }

            const maxDuration = sortedStats.length > 0 ? sortedStats[0].totalDuration : 1;

            sortedStats.forEach((stat, index) => {
                const hours = (stat.totalDuration / 3600).toFixed(1);
                const minutes = Math.floor(stat.totalDuration / 60);
                const progress = maxDuration > 0 ? (stat.totalDuration / maxDuration) * 100 : 0;
                const isQuickTask = stat.taskType === 'quick';
                
                // 格式化显示：有时长显示时长，无时长只显示次数
                let timeDisplay;
                if (stat.totalDuration > 0) {
                    timeDisplay = hours >= 1 ? `${hours}h` : `${minutes}m`;
                } else {
                    timeDisplay = `${stat.completedCount}次`;
                }

                const rankItem = document.createElement('div');
                rankItem.className = 'rank-item';
                rankItem.innerHTML = `
                    <div class="rank-number ${index < 3 ? 'top' : ''}">${index + 1}</div>
                    <div class="rank-info">
                        <div class="rank-name">
                            ${stat.name}
                            ${isQuickTask ? '<span class="quick-badge">⚡</span>' : ''}
                        </div>
                        <div class="rank-bar">
                            <div class="rank-progress" style="width: ${progress}%; background: ${isQuickTask ? '#f59e0b' : '#8b5cf6'};"></div>
                        </div>
                        <div class="rank-detail">
                            ${stat.totalDuration > 0 ? `专注 ${timeDisplay}` : ''}
                            ${stat.totalDuration > 0 && stat.completedCount > 0 ? ' · ' : ''}
                            ${stat.completedCount > 0 ? `完成 ${stat.completedCount} 次` : ''}
                        </div>
                    </div>
                    <div class="rank-time">${timeDisplay}</div>
                `;
                rankList.appendChild(rankItem);
            });
        }

        // ==================== 页面加载时恢复计时状态 ====================
        function restoreRunningTimer() {
            const todayStr = formatDate(new Date());
            const todayTasks = DataManager.getTasksByDate(todayStr);
            const runningTask = todayTasks.find(t => t.status === 'running');
            if (runningTask && runningTask.timerStartTimestamp) {
                // 验证时间戳是否合理（防止异常值）
                const now = Date.now();
                const elapsed = now - runningTask.timerStartTimestamp;
                
                // 如果已经运行超过24小时，自动暂停（防止异常）
                if (elapsed > 24 * 60 * 60 * 1000) {
                    runningTask.status = 'paused';
                    runningTask.timerStartTimestamp = null;
                    DataManager.updateTaskInstance(todayStr, runningTask);
                    showToast('检测到长时间运行，已自动暂停');
                } else {
                    currentTask = runningTask;
                    startTimerUpdate(runningTask.id);
                }
            }
        }

        // ==================== 保存任务 ====================
        function saveTask(event) {
            event.preventDefault();

            const name = document.getElementById('taskName').value.trim();
            let date = document.getElementById('taskDate').value;
            const startTime = document.getElementById('taskStartTime').value;
            const endTime = document.getElementById('taskEndTime').value;

            if (!name) {
                showToast('请填写任务名称');
                return;
            }

            if (selectedRepeat === 'none' && !date) {
                showToast('请选择日期');
                return;
            }

            if (selectedRepeat !== 'none' && !date) {
                date = formatDate(new Date());
            }

            // 验证时间段
            if (startTime && endTime && startTime >= endTime) {
                showToast('结束时间必须晚于开始时间');
                return;
            }

            if (editingTaskId) {
                // 编辑现有任务模板
                const template = DataManager.getTaskTemplate(editingTaskId);
                if (template) {
                    template.name = name;
                    template.startDate = date;
                    template.startTime = startTime || null;
                    template.endTime = endTime || null;
                    template.color = selectedColor;
                    template.repeat = selectedRepeat;
                    template.weekdays = selectedWeekdays;
                    template.taskType = selectedTaskType;
                    DataManager.updateTaskTemplate(template);
                    showToast('任务已更新');
                    // 清除缓存的实例，让它们在下次访问时重新生成
                    clearTaskInstancesCache();
                }
            } else {
                // 创建新任务模板
                const template = {
                    id: generateId(),
                    name: name,
                    startDate: date,
                    startTime: startTime || null,
                    endTime: endTime || null,
                    color: selectedColor,
                    repeat: selectedRepeat,
                    weekdays: selectedWeekdays,
                    taskType: selectedTaskType,
                    createdAt: Date.now()
                };

                DataManager.addTaskTemplate(template);
                // 清除缓存的实例，让它们在下次访问时重新生成
                clearTaskInstancesCache();
                showToast('任务已创建');
            }

            closeTaskModal();
            refreshCurrentPage();
        }

            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;

        function formatCompactDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const year = date.getFullYear().toString().slice(-2);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${year}/${month}/${day}`;
        }

        function updateDateRangeLabel(start, end) {
            const label = document.getElementById('statsDateRangeLabel');
            if (start && end) {
                label.textContent = `${formatCompactDate(start)} - ${formatCompactDate(end)}`;
            } else if (start && !end) {
                label.textContent = `${formatCompactDate(start)} 至今`;
            } else {
                label.textContent = '全部时间';
            }
        }

        function setQuickDateRange(type) {
            const now = new Date();
            let start;
            
            switch(type) {
                case 'week':
                    const weekStart = new Date(now);
                    weekStart.setDate(now.getDate() - now.getDay());
                    start = formatDate(weekStart);
                    break;
                case 'month':
                    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
                    start = formatDate(monthStart);
                    break;
                case 'year':
                    const yearStart = new Date(now.getFullYear(), 0, 1);
                    start = formatDate(yearStart);
                    break;
            }
            
            document.getElementById('statsDateStart').value = start;
            document.getElementById('statsDateEnd').value = '';
            DataManager.setStatsDateRange(start, '');
            updateDateRangeLabel(start, '');
            renderStatsPage();
        }

            const startInput = document.getElementById('statsDateStart');
            const start = startInput.value || formatDate(new Date(0));
            document.getElementById('statsDateEnd').value = '';
            DataManager.setStatsDateRange(start, '');
            updateDateRangeLabel(start, '');
            renderStatsPage();
        }

        function clearDateRange() {
            document.getElementById('statsDateStart').value = '';
            document.getElementById('statsDateEnd').value = '';
            DataManager.setStatsDateRange('', '');
            updateDateRangeLabel('', '');
            renderStatsPage();
        }

        function onStatsDateRangeChange() {
            const dateStartInput = document.getElementById('statsDateStart');
            const dateEndInput = document.getElementById('statsDateEnd');
            const start = dateStartInput.value;
            const end = dateEndInput.value;
            DataManager.setStatsDateRange(start, end);
            updateDateRangeLabel(start, end);
            renderStatsPage();
        }

        function toggleTheme() {
            if (currentTheme === 'light') {
                currentTheme = 'dark';
            } else if (currentTheme === 'dark') {
                currentTheme = 'auto';
            } else {
                currentTheme = 'light';
            }
            
            if (currentTheme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', currentTheme);
            }
            
            localStorage.setItem('theme', currentTheme);
            updateThemeIcon();
            
            const themeNames = {
                'light': '☀️ 浅色模式',
                'dark': '🌙 深色模式',
                'auto': '🔄 跟随系统'
            };
            showToast(themeNames[currentTheme]);
        }

        function updateThemeIcon() {
            const btn = document.querySelector('#statsPage .header-btn');
            if (btn) {
                const icons = {
                    'light': '🌙',
                    'dark': '☀️',
                    'auto': '🔄'
                };
                btn.textContent = icons[currentTheme];
            }
        }

        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (currentTheme === 'auto') {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            }
        });

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            // 清除旧版数据（如果存在）
            localStorage.removeItem('calendarTasks');
            
            // 初始化主题
            initTheme();

            // 初始化统计筛选器
            initStatsFilter();

            // 初始化颜色选择器事件
            document.querySelectorAll('.color-option').forEach(el => {
                el.addEventListener('click', () => selectColor(el));
            });

            // 恢复运行中的计时器
            restoreRunningTimer();

            // 渲染初始页面
            renderTodayPage();
            renderCalendar();

            // 页面可见性变化时恢复计时
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    restoreRunningTimer();
                    refreshCurrentPage();
                }
            });
        });

        // 页面关闭前保存状态
        window.addEventListener('beforeunload', () => {
            // 确保所有状态已保存
            if (currentTask && currentTask.status === 'running') {
                // 状态已经保存在 localStorage 中，无需额外操作
            }
        });

        // 注册 Service Worker - 支持 PWA 离线使用
        if ('serviceWorker' in navigator) {
            // 内联 Service Worker 代码（支持 file:// 协议）
            const swCode = `
                const CACHE_NAME = 'timetrack-v1';
                const urlsToCache = ['./', './index.html'];
                
                self.addEventListener('install', (e) => {
                    e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(urlsToCache)));
                    self.skipWaiting();
                });
                
                self.addEventListener('activate', (e) => {
                    e.waitUntil(caches.keys().then(names => Promise.all(names.filter(n => n !== CACHE_NAME).map(n => caches.delete(n)))));
                    self.clients.claim();
                });
                
                self.addEventListener('fetch', (e) => {
                    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
                });
            `;
            
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl)
                .then((reg) => console.log('Service Worker 注册成功'))
                .catch((err) => console.log('Service Worker 注册失败:', err));
        }
    </script>
</body>
